[build]
  base = "apps/flutter_web"
  publish = "build/web"
  command = "if [ -d 'flutter' ]; then cd flutter && git pull && cd ..; else git clone --depth 1 --branch stable https://github.com/flutter/flutter.git; fi && ./flutter/bin/flutter build web --release"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
