name: Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: apps/flutter_web
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter"

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Flutter Diagnostics (Doctor)
        run: flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Code Analysis (Linter)
        run: flutter analyze

      - name: Run Unit & Widget Tests
        run: flutter test

      - name: Build Web Production Bundle
        run: flutter build web --release

      - name: Archive Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vian-erp-web-build
          path: apps/flutter_web/build/web/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'vian-erp'
          directory: 'apps/flutter_web/build/web'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
