name: VIAN ERP CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Verify Backend Run
        run: |
          cd backend
          node --check server.js

  frontend-ci:
    name: Frontend CI (Flutter Web & Mobile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Install Web Dependencies
        run: |
          cd apps/flutter_web
          flutter pub get

      - name: Run Flutter Analyze (Web)
        run: |
          cd apps/flutter_web
          flutter analyze

      - name: Run Flutter Web Build (Release)
        run: |
          cd apps/flutter_web
          flutter build web --release

      - name: Install Mobile Dependencies
        run: |
          cd apps/flutter_mobile
          flutter pub get

      - name: Run Flutter Analyze (Mobile)
        run: |
          cd apps/flutter_mobile
          flutter analyze
