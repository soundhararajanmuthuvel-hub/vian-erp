name: VIAN ERP CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-size: '16.x'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Lint / Tests
        run: |
          cd backend
          npm test || echo "Skip tests if not configured"

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Frontend Dependencies
        run: |
          cd apps/flutter_web
          flutter pub get

      - name: Run Flutter Web Build Release
        run: |
          cd apps/flutter_web
          flutter build web
